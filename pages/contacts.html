<h1>Контакты</h1>

<div class="toolbar">

<button id="btnNewContact">
➕ Новый контакт
</button>

</div>

<table id="contactsTable" class="display" style="width:100%">

<thead>

<tr>

<th>Название</th>
<th>Тип</th>
<th>Платформа</th>
<th>Email</th>
<th>Страна</th>
<th>Статус</th>
<th></th>

</tr>

</thead>

<tbody></tbody>

</table>

<div id="contactModal" class="modal hidden">

<div class="modal-window">

<h2>Новый контакт</h2>

<input id="cName" placeholder="Название">

<input id="cEmail" placeholder="Email">

<input id="cPlatform" placeholder="Платформа">

<input id="cType" placeholder="Тип">

<input id="cCountry" placeholder="Страна">

<button id="saveContact">
💾 Сохранить
</button>

<button id="closeModal">
Закрыть
</button>

</div>

</div>
