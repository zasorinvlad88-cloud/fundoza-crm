<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 Вход — Music CRM</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-dark: #0f0e17;
            --bg-card: #1a1a2e;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: -1;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(102, 126, 234, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(118, 75, 162, 0.03) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-2%, 2%) rotate(-1deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            width: 64px;
            height: 64px;
            background: var(--primary-gradient);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin: 0;
        }

        .login-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .form-control-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            color: var(--text-primary);
        }

        .form-control-glass::placeholder {
            color: var(--text-secondary);
        }

        .btn-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
            width: 100%;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .text-muted {
            color: var(--text-secondary);
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f87171;
            font-size: 14px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 24px;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: none;
            z-index: 9999;
            max-width: 400px;
            font-size: 14px;
            border-left: 4px solid #667eea;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Логотип -->
            <div class="login-logo">
                <div class="icon"><i class="bi bi-headphones"></i></div>
                <h1>Music CRM</h1>
                <p>Войдите в систему управления музыкой</p>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control form-control-glass" id="emailInput" 
                           placeholder="your@email.com" required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control form-control-glass" id="passwordInput" 
                           placeholder="••••••••" required />
                </div>

                <div class="error-message" id="errorMessage">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="errorText">Неверный email или пароль</span>
                </div>

                <button type="submit" class="btn-gradient mt-2" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Войти
                </button>

                <div class="auth-divider">или</div>

                <button type="button" class="btn" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: var(--text-secondary);" onclick="demoLogin()">
                    <i class="bi bi-person"></i> Войти как демо-пользователь
                </button>
            </form>

            <div class="text-center mt-3" style="font-size: 12px; color: var(--text-secondary);">
                <i class="bi bi-shield-check"></i> Безопасный вход через Supabase
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast">
        <div id="toastMessage"></div>
    </div>

    <script>
        // ============================================================
        // ПОДКЛЮЧЕНИЕ SUPABASE
        // ============================================================

        // Замените на свои данные из Supabase
        const SUPABASE_URL = 'https://hyjclbhebdrtljlemstv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5amNsYmhlYmRydGxqbGVtc3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzEyMDYsImV4cCI6MjA5OTA0NzIwNn0.hEc6K93MOe5q0U-hBdIk3rV1rO1m6d8zGsVezQ6i5aY';

        // Инициализация Supabase
        const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // ФУНКЦИИ
        // ============================================================

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            const icons = {
                info: '📌',
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            
            toastMessage.textContent = `${icons[type] || '📌'} ${message}`;
            toast.style.display = 'block';
            toast.style.borderLeftColor = type === 'success' ? '#34d399' : 
                                          type === 'error' ? '#f87171' : 
                                          type === 'warning' ? '#fbbf24' : '#667eea';
            
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        // Проверка авторизации при загрузке
        async function checkAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
            }
        }

        // Вход
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMessage');
            
            if (!email || !password) {
                showToast('Заполните все поля', 'warning');
                return;
            }
            
            // Блокируем кнопку
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Вход...';
            errorEl.style.display = 'none';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.session) {
                    showToast('✅ Добро пожаловать!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                errorEl.style.display = 'block';
                document.getElementById('errorText').textContent = 
                    error.message === 'Invalid login credentials' 
                        ? 'Неверный email или пароль' 
                        : error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Войти';
            }
        }

        // Демо-вход (для тестирования)
        async function demoLogin() {
            showToast('⏳ Вход как демо-пользователь...', 'info');
            
            try {
                // Создаём демо-пользователя если его нет
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: 'demo@musiccrm.com',
                    password: 'Demo123456!'
                });
                
                if (error && error.message.includes('Invalid login credentials')) {
                    // Пользователь не существует — создаём
                    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
                        email: 'demo@musiccrm.com',
                        password: 'Demo123456!'
                    });
                    
                    if (signUpError) throw signUpError;
                    
                    showToast('✅ Демо-пользователь создан!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                    return;
                }
                
                if (error) throw error;
                
                if (data.session) {
                    showToast('✅ Добро пожаловать, демо-пользователь!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                }
            } catch (error) {
                console.error('Ошибка демо-входа:', error);
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            console.log('🔐 Страница входа загружена');
        });
    </script>
</body>
</html>
