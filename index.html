<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 Music CRM — Управление треками и рассылкой</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
    
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-dark: #0f0e17;
            --bg-card: #1a1a2e;
            --text-primary: #fffffe;
            --text-secondary: #a7a9be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: -1;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(102, 126, 234, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(118, 75, 162, 0.03) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-2%, 2%) rotate(-1deg); }
        }

        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== НАВИГАЦИОННОЕ МЕНЮ ===== */
        .nav-menu {
            display: flex;
            gap: 8px;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 6px;
            margin-bottom: 24px;
            overflow-x: auto;
            flex-wrap: nowrap;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .nav-link i {
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .nav-link {
                font-size: 12px;
                padding: 8px 14px;
            }
            .nav-link i {
                font-size: 14px;
            }
            .nav-link span {
                display: none;
            }
        }

        /* ===== ШАПКА ===== */
        .header {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-brand .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header-brand h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin: 0;
        }

        .header-brand .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-status {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            border: 1px solid rgba(52, 211, 153, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-status .pulse {
            width: 8px;
            height: 8px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ===== ОСТАЛЬНЫЕ СТИЛИ (оставляем ваши) ===== */
        /* ... ваш код ... */
        
        .card-music {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .card-music:hover {
            border-color: rgba(102, 126, 234, 0.2);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .card-title i {
            color: #667eea;
            font-size: 22px;
        }

        /* ... остальные ваши стили ... */
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="main-container fade-in">
        
        <!-- ===== МЕНЮ НАВИГАЦИИ ===== -->
        <nav class="nav-menu">
            <a href="/" class="nav-link active">
                <i class="bi bi-grid-1x2-fill"></i> <span>Главная</span>
            </a>
            <a href="/import" class="nav-link">
                <i class="bi bi-file-earmark-spreadsheet"></i> <span>Импорт треков</span>
            </a>
            <a href="/import-contacts" class="nav-link">
                <i class="bi bi-people-fill"></i> <span>Импорт контактов</span>
            </a>
        </nav>

        <!-- ===== ШАПКА ===== -->
        <header class="header">
            <div class="header-brand">
                <div class="logo-icon"><i class="bi bi-headphones"></i></div>
                <div>
                    <h1>Music CRM</h1>
                    <span class="subtitle">Управление треками и рассылкой</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="badge-status">
                    <span class="pulse"></span> Система активна
                </div>
                <button class="btn btn-outline-glass" onclick="loadStats()">
                    <i class="bi bi-graph-up-arrow"></i> Статистика
                </button>
                <button class="btn btn-gradient" onclick="openContactsModal()">
                    <i class="bi bi-people"></i> Контакты
                </button>
            </div>
        </header>

        <!-- ОСТАЛЬНОЙ КОНТЕНТ (ваш) -->
        <!-- ... -->

    </div>

    <!-- СКРИПТЫ -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <!-- ... ваш код ... -->
</body>
</html>
